<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    PROBEX — Option 2 brand mark
    ─────────────────────────────
    Folded-ribbon "P" in the blue→purple brand gradient on a dark rounded
    square. Single source of truth for every favicon / app-icon size
    (rasterised via scripts to PNG + ICO).
  -->
  <defs>
    <!-- Primary blue → purple gradient, top-right to bottom-left -->
    <linearGradient id="pg" x1="0.85" y1="0.05" x2="0.15" y2="1">
      <stop offset="0%"   stop-color="#3B82F6"/>
      <stop offset="48%"  stop-color="#4F6EF5"/>
      <stop offset="100%" stop-color="#6D5EF7"/>
    </linearGradient>
    <!-- Slightly darker gradient for the folded underside of the ribbon -->
    <linearGradient id="pgFold" x1="0.85" y1="0.05" x2="0.15" y2="1">
      <stop offset="0%"   stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0B1220"/>

  <!-- Soft brand glow behind the mark -->
  <ellipse cx="300" cy="190" rx="170" ry="140" fill="#4F6EF5" fill-opacity="0.10"/>

  <g clip-path="url(#round)">
    <!-- Stem: bold vertical ribbon with a lower-left tail -->
    <polygon points="150,96 236,96 236,360 196,430 150,430" fill="url(#pg)"/>

    <!-- Bowl: folded ribbon loop. Outer sweep right, inner cut returns to stem. -->
    <path
      d="M 236 96
         L 318 96
         A 150 150 0 0 1 318 372
         L 236 372
         L 236 300
         L 300 300
         A 78 78 0 0 0 300 168
         L 236 168
         Z"
      fill="url(#pg)"
    />

    <!-- Fold crease: a thin darker wedge where the ribbon bends, giving the
         origami depth of the Option-2 mark. -->
    <polygon points="236,96 236,168 300,168" fill="url(#pgFold)" fill-opacity="0.55"/>
    <polygon points="236,300 300,300 236,372" fill="url(#pgFold)" fill-opacity="0.55"/>
  </g>
</svg>
